{% extends "base.html" %}

{% block title %}Change Password - EduGrade{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;" class="change-password-wrapper">
    <div class="glass-card" style="width: 100%; max-width: 480px;">
        <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--accent-indigo);">
            <i data-lucide="key-round"></i>
            Change Portal Password
        </h2>

        <form action="{{ url_for('student_change_password') }}" method="POST">
            <div class="form-group">
                <label for="current_password" class="form-label">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="form-control" required placeholder="Enter current password">
            </div>

            <div class="form-group">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required minlength="6" placeholder="Enter new password (min. 6 chars)">
            </div>

            <div class="form-group" style="margin-bottom: 1.75rem;">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6" placeholder="Re-enter new password">
            </div>

            <div style="display: flex; gap: 0.5rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;"><i data-lucide="shield-check"></i> Change Password</button>
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
